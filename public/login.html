<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — VulnVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080b14;
      --card: #111827;
      --border: rgba(148, 163, 184, 0.12);
      --text: #f0f4ff;
      --muted: #94a3b8;
      --accent: #6366f1;
      --cyan: #06b6d4;
      --err: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .mesh {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 600px 400px at 20% 30%, rgba(99,102,241,0.08), transparent 70%),
        radial-gradient(ellipse 500px 500px at 80% 70%, rgba(6,182,212,0.06), transparent 70%);
    }
    .card {
      position: relative;
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 6px; }
    .sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f172a;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 18px;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--cyan));
      color: white;
      margin-top: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(99,102,241,0.35); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .err {
      display: none;
      font-size: 13px;
      color: var(--err);
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .err.show { display: block; }
  </style>
</head>
<body>
  <div class="mesh"></div>
  <div class="card">
    <h1>VulnVault</h1>
    <p class="sub">Sign in to VulnVault — your secure vulnerability management platform.</p>
    <div class="err" id="err"></div>
    <form id="form">
      <label for="user">Username</label>
      <input id="user" name="username" autocomplete="username" required />
      <label for="pass">Password</label>
      <input id="pass" type="password" name="password" autocomplete="current-password" required />
      <button type="submit" class="btn" id="btn">Sign in</button>
    </form>
  </div>
  <script>
    (async function () {
      try {
        const r = await fetch('/api/session');
        const j = await r.json();
        if (j.authenticated) {
          const mgmtRoles = ['admin','manager','pm'];
          window.location.replace(mgmtRoles.includes(j.role) ? '/portal.html' : '/');
          return;
        }
      } catch (_) {}

      const form = document.getElementById('form');
      const err = document.getElementById('err');
      const btn = document.getElementById('btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        err.classList.remove('show');
        btn.disabled = true;
        const username = document.getElementById('user').value.trim();
        const password = document.getElementById('pass').value;
        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            err.textContent = data.error || 'Sign in failed';
            err.classList.add('show');
            return;
          }
          const mgmtRoles = ['admin','manager','pm'];
          window.location.replace(mgmtRoles.includes(data.role) ? '/portal.html' : '/');
        } catch {
          err.textContent = 'Network error';
          err.classList.add('show');
        } finally {
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
