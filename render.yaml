# Render Blueprint — https://render.com/docs/blueprint-spec
# Flow: push repo to GitHub → Render Dashboard → New → Blueprint → connect repo.
# After first deploy, confirm ENV vars APP_LOGIN_USER + APP_LOGIN_PASSWORD are set (Dashboard → Environment).

services:
  - type: web
    name: vulnvault
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FORCE_SECURE_COOKIE
        value: "1"
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_LOGIN_USER
        sync: false
      - key: APP_LOGIN_PASSWORD
        sync: false
